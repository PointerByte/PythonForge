# Publishing to PyPI via Trusted Publishing.
#
# Deliberately manual: this workflow only runs when someone triggers it from
# the Actions tab. It is NOT wired to tag pushes, so no accidental release can
# happen just by tagging.
#
# Before the first run:
#   1. Create the project on PyPI (and TestPyPI) and configure Trusted
#      Publishing for this repository + workflow filename (publish.yml).
#   2. Create the GitHub environments named below, ideally with required
#      reviewers.
#   3. Bump `version` in pyproject.toml and land it on main.
#
# See push.txt for the equivalent manual checklist.
name: Publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: Where to publish
        required: true
        default: testpypi
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    permissions:
      id-token: write  # required for Trusted Publishing; no API token is stored
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        if: inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
