name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          # .typing/pythonforge is a symlink mypy needs; without this git may
          # check it out as a plain file on some runners.
          set-safe-directory: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all,dev]"

      - name: Verify the typing symlink survived checkout
        run: |
          test -d .typing/pythonforge || {
            echo "::error::.typing/pythonforge is not a directory -- the symlink did not survive checkout"
            exit 1
          }

      - name: Format
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Types
        run: python -m mypy .typing/pythonforge tests

      - name: Tests
        run: python -m pytest --cov=pythonforge --cov-report=term-missing --cov-fail-under=85

      - name: Security scan
        run: python -m bandit -q -r src

      - name: Dependency audit
        run: python -m pip_audit
        continue-on-error: true  # advisory feeds go down; never block a PR on that

  protos:
    # The generated stubs are committed. If regenerating produces a diff, the
    # .proto files changed without the stubs being regenerated.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[grpc,dev]"
      - run: ./scripts/gen_protos.sh
      - name: Stubs must be up to date
        run: |
          if ! git diff --exit-code -- src/transport/grpc/generated; then
            echo "::error::Generated gRPC stubs are stale. Run ./scripts/gen_protos.sh and commit the result."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Smoke-test the wheel in a clean environment
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/python -m pip install --upgrade pip
          /tmp/smoke/bin/python -m pip install dist/*.whl
          /tmp/smoke/bin/python smoke_test.py

      - name: The base install must not pull in heavy SDKs
        run: |
          for pkg in grpcio boto3 azure-identity google-cloud-kms opentelemetry-sdk cryptography typer; do
            if /tmp/smoke/bin/python -m pip show "$pkg" >/dev/null 2>&1; then
              echo "::error::$pkg leaked into the base install; it belongs behind an extra"
              exit 1
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
